name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: DeadlyPro34
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#FF61F6&color_dots=#ebedf0,#bfd6f6,#8dbdff,#64a1f4,#4b91f1
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00ffd2&color_dots=#161b22,#3a2a47,#6a3f85,#ab5cba,#ff61f6

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
